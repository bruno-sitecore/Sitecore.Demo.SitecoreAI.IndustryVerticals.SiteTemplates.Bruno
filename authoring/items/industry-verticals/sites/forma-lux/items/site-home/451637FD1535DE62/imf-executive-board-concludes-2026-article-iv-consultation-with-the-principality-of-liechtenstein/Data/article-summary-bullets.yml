    - ID: "729034fc-24f3-40b7-8fa4-fb49d7de20dd"
      Hint: Text
      Value: "<ul><li>Despite global headwinds, Liechtenstein has preserved high incomes, low unemployment, and a strong fiscal position, but its highly open economy is exposed to ongoing global and geopolitical shifts.</li><li>Medium-term spending pressures (e.g., aging, climate, security) are rising and should be fully quantified and reflected in fiscal plans; pension system sustainability needs timely action.</li><li>Fiscal policy should be more supportive while the fiscal framework must enhance timely monitoring and be ready to respond to shocks.</li><li>Financial sector resilience should be bolstered via robust risk monitoring, strengthened prudential oversight, expanded macroprudential analysis (including non-bank intermediaries), and stronger AML/CFT supervision.</li><li>Structural reforms are needed to address skills shortages, raise labor supply (including female and older-worker participation), accelerate digitalization and STEM education, and close key macroeconomic data gaps (national accounts and balance of payments statistics).</li><li>Macroeconomic projections were finalized prior to the Middle East conflict; a staff supplement notes that the conflict and higher energy prices are expected to weigh on near-term growth and raise inflation but do not change staff policy advice.</li></ul>"
