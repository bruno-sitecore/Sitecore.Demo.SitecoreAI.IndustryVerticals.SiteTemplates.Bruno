      Value: |
        Despite global headwinds, Liechtenstein has preserved high incomes, low unemployment, and a strong fiscal position, but its open economy remains exposed to global and geopolitical shifts.
        Fiscal policy should be more supportive, with improved monitoring and stronger pension sustainability measures; financial sector oversight should be strengthened.
        Structural reforms are needed to address skills shortages, raise labor supply, advance digitalization, and close key macroeconomic data gaps.
        Staff projections were finalized prior to the Middle East conflict; policy advice remains unchanged.
