        <p><strong>Washington, DC  March 27, 2026:</strong> On March 23, 2026, the Executive Board of the International Monetary Fund (IMF) completed the Article IV Consultation for the Principality of Liechtenstein.<sup>1</sup> The authorities have consented to the publication of the Staff Report prepared for this consultation.</p>
        
        <p>Economic activity remained subdued amid uncertainty and weak external demand in 2025. Growth is estimated to have been flat in 2025. Inflation has stayed low, reflecting Swiss franc appreciation. Labor market conditions have cooled, with unemployment rising to around 2 percent due to workforce reductions in the automotive sector. The effective U.S. tariff rate rose to around 25 percent in 2025, weighing on Liechtensteins specialized, export-oriented manufacturing activity.</p>
        
        <p>The fiscal surplus declined in 2025 reflecting higher infrastructure and digitalization spending and weaker revenue performance but remained high at 2.8 percent of GDP. Net financial assets of the general government, including social security fund assets, are estimated to have stayed above 140 percent of GDP. General government debt has remained virtually zero. Banks remain highly capitalized and liquid with a low aggregate NPL ratio, but capital adequacy and liquidity metrics have declined since 2023 with subpar profitability partly reflecting the high cost of the private banking model.</p>
        
        <p><sup>1</sup> Under Article IV of the IMF's Articles of Agreement, the IMF holds bilateral discussions with members, usually every year. A staff team visits the country, collects economic and financial information, and discusses with officials the country's economic developments and policies. On return to headquarters, the staff prepares a report, which forms the basis for discussion by the Executive Board.</p>
        
        <p>Growth is projected to remain flat in 2026 as uncertainty, trade barriers, and weak external demand continue to weigh on output. As firms adjust to the new trade environment and external conditions normalize, growth is expected to recover gradually toward its estimated potential of 1.5 percent. Inflation is projected to remain below 1 percent over the near and medium terms. Risks are tilted to the downside, including heightened trade uncertainty, weaker-than-expected growth in key trading partners or renewed safe-haven appreciation of the franc. Given its global client base, the financial center may be vulnerable to asset repricing, increased market volatility, tighter global financial conditions, and potential reputational risks. Large fiscal buffers provide a cushion against adverse shocks. Continued reforms are needed to address skills shortages, increase labor supply (e.g., women), advance digitalization, and enhance security.</p>
        
        <p>The macroeconomic projections underlying the consultation were finalized prior to the conflict in the Middle East. The conflict and associated energy price increases are expected to weigh on near-term growth and raise inflation, as assessed in a supplement to the Staff Report. These developments do not change staffs policy advice.</p>
        
        <h2>Executive Board Assessment<sup>2</sup></h2>
        
        <p>Executive Directors agreed with the thrust of the staff appraisal. They commended Liechtensteins strong economic fundamentals, noting that the country has maintained high incomes, low unemployment, and sizable bufferswith virtually no debtdespite global headwinds in recent years. Directors agreed that the near-term outlook is challenging with elevated global uncertainty, and risks are tilted to the downside. Against this backdrop, they concurred that strengthened medium-term fiscal planning, enhanced financial-sector oversight, and continued reform implementation are essential to preserve the economys resilience and lift medium-term growth.</p>
        
        <p>Most Directors recommended avoiding an overly tight fiscal stance given weak economic growth, and concurred that the automatic stabilizers should serve as the first line of defense should downside risks materialize. These Directors also encouraged the authorities to refine the fiscal framework to better align policy decisions with evolving macroeconomic conditions. A few Directors considered, however, that the balanced budget rule serves Liechtenstein well, underpinning fiscal credibility and buffer accumulation to deal with shocks. Directors recommended that future spending pressures related to aging, climate commitments, and security needs be systematically quantified in fiscal plans. In this context, they also noted the need to address future pension system financing needs in a timely manner.</p>
        
        <p><sup>2</sup> At the conclusion of the discussion, the Managing Director, as Chair of the Board, summarizes the views of Executive Directors, and this summary is transmitted to the country's authorities. An explanation of any qualifiers used in summings up can be found at: http://www.imf.org/external/np/sec/misc/qualifiers.htm.</p>
        
        <p>Directors welcomed the strong capital and liquidity positions of banks, while noting that declining capital and liquidity ratios as well as subdued profitability warrant continued supervisory vigilance. In particular, they emphasized the importance of strengthening macroprudential oversight and stress testing, including of non-bank financial intermediaries. Directors recommended expanding the existing systemic risk analysis framework to incorporate interconnectedness analysis across financial subsectors. They underscored the importance of safeguarding financial integrity through strengthened AML/CFT supervision, including over trustees.</p>
        
        <p>Directors encouraged structural reforms to enhance productivity and sustain growth. They emphasized measures to raise labor force participation, including among females and older workers, and called for greater emphasis on digital skills and STEM education. Directors recommended targeted investments in transport and digital infrastructure as well as in cyber resilience. They welcomed the authorities continued efforts to meet their climate targets. Directors emphasized that closing macroeconomic data gaps, especially in national accounts and balance of payment statistics, with support from IMF technical assistance, is crucial.</p>
        
