      Hint: Content
      Value: |
        <p>On March 23, 2026, the Executive Board of the International Monetary Fund (IMF) completed the Article IV Consultation with the Principality of Liechtenstein. The authorities consented to publication of the Staff Report prepared for this consultation.</p>
        
        <h2>Key messages</h2>
        <ul>
          <li>Despite global headwinds, Liechtenstein has preserved high incomes, low unemployment, and a strong fiscal position. However, its highly open economy is exposed to continuing global and geopolitical shifts, and medium-term spending pressures are rising and should be fully quantified and reflected in fiscal plans. Productivity remains above peers, but the gap is narrowing.</li>
          <li>Fiscal policy should be more supportive, and the fiscal framework should enhance timely monitoring and stand ready to respond to shocks. Actions are needed to improve pension system sustainability. Financial sector policies should bolster resilience through robust risk monitoring and strong prudential oversight.</li>
          <li>Continued structural reforms are needed to address skills shortages, raise labor supply, and advance digitalization. Progress in closing data gaps—particularly improving the timeliness of national accounts and establishing balance of payments statistics—remains a priority.</li>
          <li>The macroeconomic projections underlying the consultation were finalized prior to the conflict in the Middle East, but staff’s policy advice remains unchanged.</li>
          <li>Banks remain highly capitalized and liquid with low NPLs, though capital adequacy, liquidity metrics, and profitability have declined since 2023, warranting continued supervisory vigilance and strengthened macroprudential oversight.</li>
        </ul>
        
        <h2>Recent economic developments</h2>
        <p>Economic activity remained subdued amid uncertainty and weak external demand in 2025. Growth is estimated to have been flat in 2025. Inflation has stayed low, reflecting Swiss franc appreciation. Labor market conditions cooled, with unemployment rising to around 2 percent due to workforce reductions in the automotive sector. The effective U.S. tariff rate rose to around 25 percent in 2025, weighing on Liechtenstein’s specialized, export-oriented manufacturing activity.</p>
        
        <p>The fiscal surplus declined in 2025 reflecting higher infrastructure and digitalization spending and weaker revenue performance but remained high at 2.8 percent of GDP. Net financial assets of the general government, including social security fund assets, are estimated to have stayed above 140 percent of GDP. General government debt has remained virtually zero.</p>
        
        <p>Banks remain highly capitalized and liquid with a low aggregate NPL ratio, but capital adequacy and liquidity metrics have declined since 2023 with subpar profitability partly reflecting the high cost of the private banking model.</p>
        
        <h2>Outlook and risks</h2>
        <p>Growth is projected to remain flat in 2026 as uncertainty, trade barriers, and weak external demand continue to weigh on output. As firms adjust to the new trade environment and external conditions normalize, growth is expected to recover gradually toward its estimated potential of about 1.5 percent. Inflation is projected to remain below 1 percent over the near and medium terms.</p>
        
        <p>Risks are tilted to the downside, including heightened trade uncertainty, weaker-than-expected growth in key trading partners, or renewed safe-haven appreciation of the franc. Given its global client base, the financial center may be vulnerable to asset repricing, increased market volatility, tighter global financial conditions, and potential reputational risks. Large fiscal buffers provide a cushion against adverse shocks.</p>
        
        <p>The macroeconomic projections underlying the consultation were finalized prior to the conflict in the Middle East. The conflict and associated energy price increases are expected to weigh on near-term growth and raise inflation, as assessed in a supplement to the Staff Report. These developments do not change staff’s policy advice.</p>
        
        <h2>Executive Board assessment</h2>
        <p>Executive Directors agreed with the thrust of the staff appraisal. They commended Liechtenstein’s strong economic fundamentals, noting the country has maintained high incomes, low unemployment, and sizable buffers—with virtually no debt—despite global headwinds. Directors agreed the near-term outlook is challenging with elevated global uncertainty and that risks are tilted to the downside. They concurred that strengthened medium-term fiscal planning, enhanced financial-sector oversight, and continued reform implementation are essential to preserve the economy’s resilience and lift medium-term growth.</p>
        
        <p>Most Directors recommended avoiding an overly tight fiscal stance given weak economic growth and concurred that automatic stabilizers should serve as the first line of defense should downside risks materialize. These Directors encouraged the authorities to refine the fiscal framework to better align policy decisions with evolving macroeconomic conditions. A few Directors noted that the balanced budget rule has underpinned fiscal credibility and buffer accumulation and serves Liechtenstein well. Directors recommended that future spending pressures related to aging, climate commitments, and security needs be systematically quantified in fiscal plans and emphasized the need to address pension system financing needs in a timely manner.</p>
        
        <p>Directors welcomed strong capital and liquidity positions in banks, while noting that declining capital and liquidity ratios and subdued profitability warrant continued supervisory vigilance. They emphasized strengthening macroprudential oversight and stress testing, including of non-bank financial intermediaries, and expanding the systemic risk analysis framework to incorporate interconnectedness across financial subsectors. Directors also underscored the importance of safeguarding financial integrity through strengthened AML/CFT supervision, including oversight of trustees.</p>
        
        <p>Directors encouraged structural reforms to enhance productivity and sustain growth, emphasizing measures to raise labor force participation (including among women and older workers), greater emphasis on digital skills and STEM education, and targeted investments in transport and digital infrastructure and cyber resilience. Directors welcomed the authorities’ continued efforts to meet climate targets and emphasized that closing macroeconomic data gaps—especially in national accounts and balance of payments statistics—with IMF technical assistance is crucial.</p>
        
        <h2>Selected indicators (highlights)</h2>
        <ul>
          <li>Real GDP growth: estimated 0.0% in 2025, with gradual recovery toward about 1.5% over the medium term.</li>
          <li>Inflation: low, with projections below 1% over the near and medium term (Swiss CPI used as a proxy).</li>
          <li>General government balance: surplus of 2.8% of GDP in 2025; projected around 3.0–3.3% in the medium term.</li>
          <li>Public debt: virtually zero (around 0.5% of GDP in the table).</li>
          <li>Unemployment: around 2% noted in the narrative; resident ILO-consistent measure around 3.5% in 2025.</li>
        </ul>
        
        <p><strong>Location:</strong> Washington, DC<br>
        <strong>Date:</strong> March 27, 2026</p>
