    - ID: "56a52337-177b-46b4-ae72-6b9083bb6700"
      Hint: Content
      Value: "<p>Puerto Rico punches above its size. You can breakfast on mallorca bread in <strong>Old San Juan</strong>, hike misty rainforest trails by midday, and still make a late-afternoon swim on the north coast—then end with a boat tour in a glowing bay.</p><h2>Old San Juan without the rush</h2><p>Give the forts at least half a day. Wear sun protection and carry water; Atlantic breezes can hide how strong the UV is. Afterward, descend into the lower city for mofongo, craft cocktails, and live plena spilling from doorways.</p><h2>El Yunque and the east</h2><p><strong>El Yunque National Forest</strong> is a compact masterpiece of waterfalls and viewpoints. Pair it with <strong>Luquillo</strong> for approachable local food kiosks, or push east toward <strong>Fajardo</strong> if you are staging a bio-bay kayak trip—new moon nights are brightest.</p><h2>West coast and islands</h2><p><strong>Rincón</strong> draws surfers; <strong>Cabo Rojo</strong> offers dramatic cliffs. For overnight escapes, <strong>Vieques</strong> and <strong>Culebra</strong> add quieter beaches—book ferries or flights early in high season.</p><p>Puerto Rico rewards a loose itinerary: leave room for a second café stop, an unplanned beach, and the kind of night that starts with one song and ends with many.</p>"
